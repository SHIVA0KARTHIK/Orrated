<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Touchless WebAR: Medical & Mechanical Visualization</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Segoe UI', sans-serif; }
        
        /* Video Background (The Reality) */
        #input_video {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; transform: scaleX(-1); /* Mirror effect */
            z-index: 1;
        }

        /* 3D Overlay (The Augmented) */
        #output_canvas {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 2;
        }

        /* UI Panel */
        #ui-panel {
            position: absolute; top: 20px; left: 20px; z-index: 10;
            background: rgba(10, 20, 30, 0.85);
            backdrop-filter: blur(10px);
            padding: 20px; border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white; width: 280px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }

        h1 { font-size: 1.2rem; margin: 0 0 10px 0; color: #4facfe; }
        p { font-size: 0.9rem; color: #ccc; margin-bottom: 15px; }

        .control-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 0.85rem; font-weight: bold; }

        select, button {
            width: 100%; padding: 8px; border-radius: 6px; border: none;
            background: #2a2a3a; color: white; cursor: pointer;
            transition: 0.2s;
        }
        select:hover, button:hover { background: #3a3a4a; }
        
        .status-dot {
            height: 10px; width: 10px; background-color: #ff4444;
            border-radius: 50%; display: inline-block; margin-right: 8px;
        }
        .active { background-color: #00fa9a; box-shadow: 0 0 8px #00fa9a; }
        
        #loading {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: white; z-index: 20; font-size: 1.5rem; display: block;
        }
    </style>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <script async src="https://unpkg.com/es-module-shims@1.3.6/dist/es-module-shims.js"></script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>
</head>
<body>

    <video id="input_video" playsinline></video>
    <canvas id="output_canvas"></canvas>
    <div id="loading">Initialize WebAR System...</div>

    <div id="ui-panel">
        <h1><span id="status-dot" class="status-dot"></span>WebAR Controller</h1>
        <p>Use hand gestures to interact.</p>
        
        <div class="control-group">
            <label>Select Model</label>
            <select id="model-selector">
                <option value="heart">Biomimetic Heart</option>
                <option value="engine">Turbo Engine</option>
            </select>
        </div>

        <div class="control-group">
            <label>Visualization Mode</label>
            <button id="toggle-wireframe">Toggle X-Ray Mode</button>
        </div>
        
        <div style="font-size: 0.8rem; color: #888; border-top: 1px solid #444; padding-top: 10px;">
            <strong>Gestures:</strong><br>
            👆 <b>One Hand Pinch:</b> Rotate<br>
            👐 <b>Two Hand Pinch:</b> Zoom/Scale
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';

        // --- Configuration & State ---
        const config = {
            sensitivity: { rotate: 2.5, scale: 0.005 },
            pinchThreshold: 0.05 // Distance between thumb and index to trigger pinch
        };

        const state = {
            isPinching: false,
            isTwoHandPinch: false,
            lastX: 0,
            lastY: 0,
            initialPinchDistance: 0,
            currentScale: 1,
            isWireframe: false,
            activeModelType: 'heart'
        };

        // --- Three.js Setup ---
        const canvas = document.getElementById('output_canvas');
        const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);

        const scene = new THREE.Scene();
        
        // Camera setup
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 5;

        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(2, 5, 5);
        scene.add(dirLight);
        const blueLight = new THREE.PointLight(0x0088ff, 0.5); // Cinematic rim light
        blueLight.position.set(-5, 0, 2);
        scene.add(blueLight);

        // --- Model Generation (Procedural) ---
        let currentModel = null;
        const models = {};

        // 1. Procedural Heart
        function createHeart() {
            const group = new THREE.Group();
            
            // Heart Shape (using Lathe geometry trick or distorted sphere)
            const geometry = new THREE.IcosahedronGeometry(1.2, 2);
            const material = new THREE.MeshPhysicalMaterial({
                color: 0xaa0022, roughness: 0.2, metalness: 0.1,
                clearcoat: 0.5, clearcoatRoughness: 0.1,
                flatShading: false
            });
            
            // Distort vertices to look like a heart
            const pos = geometry.attributes.position;
            const v = new THREE.Vector3();
            for (let i = 0; i < pos.count; i++) {
                v.fromBufferAttribute(pos, i);
                let x = v.x, y = v.y, z = v.z;
                // Simple mathematical approximation for heart distortion
                y = y * 1.2; 
                z = z * 0.8; 
                pos.setXYZ(i, x, y, z);
            }
            geometry.computeVertexNormals();

            const mesh = new THREE.Mesh(geometry, material);
            group.add(mesh);

            // Arteries
            const arteryGeo = new THREE.TorusGeometry(0.6, 0.15, 16, 50);
            const arteryMat = new THREE.MeshStandardMaterial({ color: 0x880011 });
            const artery = new THREE.Mesh(arteryGeo, arteryMat);
            artery.position.y = 1.0;
            artery.rotation.x = Math.PI / 2;
            group.add(artery);

            group.userData = { type: 'heart', baseScale: 1, beatSpeed: 0.05 };
            return group;
        }

        // 2. Procedural Engine
        function createEngine() {
            const group = new THREE.Group();

            // Main block
            const blockGeo = new THREE.CylinderGeometry(0.8, 0.8, 2, 32);
            const metalMat = new THREE.MeshStandardMaterial({ 
                color: 0x888899, metalness: 0.9, roughness: 0.4 
            });
            const block = new THREE.Mesh(blockGeo, metalMat);
            block.rotation.z = Math.PI / 2;
            group.add(block);

            // Pistons / Turbines
            const fanGeo = new THREE.BoxGeometry(0.2, 2.2, 0.05);
            const fanMat = new THREE.MeshStandardMaterial({ color: 0xffaa00, emissive: 0xaa4400, emissiveIntensity: 0.2 });
            
            for(let i=0; i<4; i++) {
                const fan = new THREE.Mesh(fanGeo, fanMat);
                fan.rotation.x = (Math.PI / 4) * i;
                fan.position.x = 1.1; // End of cylinder
                fan.userData = { isRotor: true };
                group.add(fan);
            }

            group.userData = { type: 'engine', baseScale: 1 };
            return group;
        }

        function switchModel(type) {
            if (currentModel) scene.remove(currentModel);
            
            if (!models[type]) {
                if (type === 'heart') models[type] = createHeart();
                if (type === 'engine') models[type] = createEngine();
            }
            
            currentModel = models[type];
            currentModel.rotation.set(0, 0, 0); // Reset rotation
            state.currentScale = 1;
            currentModel.scale.set(1, 1, 1);
            
            // Apply current wireframe state
            updateWireframe();
            
            scene.add(currentModel);
            state.activeModelType = type;
        }

        function updateWireframe() {
            if (!currentModel) return;
            currentModel.traverse((child) => {
                if (child.isMesh) {
                    child.material.wireframe = state.isWireframe;
                }
            });
        }

        // Initialize First Model
        switchModel('heart');

        // --- Interaction Logic (Hand Tracking) ---
        
        function calculateDistance(p1, p2) {
            return Math.sqrt(Math.pow(p1.x - p2.x, 2) + Math.pow(p1.y - p2.y, 2));
        }

        function handleGestures(results) {
            const hands = results.multiHandLandmarks;
            if (!hands || hands.length === 0) {
                state.isPinching = false;
                state.isTwoHandPinch = false;
                return;
            }

            // We only process up to 2 hands
            const hand1 = hands[0];
            const hand2 = hands.length > 1 ? hands[1] : null;

            // 1. Detect Pinch (Thumb Tip #4, Index Tip #8)
            const p1_thumb = hand1[4];
            const p1_index = hand1[8];
            const dist1 = calculateDistance(p1_thumb, p1_index);
            const isHand1Pinching = dist1 < config.pinchThreshold;

            let isHand2Pinching = false;
            if (hand2) {
                const p2_thumb = hand2[4];
                const p2_index = hand2[8];
                const dist2 = calculateDistance(p2_thumb, p2_index);
                isHand2Pinching = dist2 < config.pinchThreshold;
            }

            // --- Logic Branching ---

            // A. Two-Hand Scaling (Zoom)
            if (isHand1Pinching && isHand2Pinching && hand2) {
                // Calculate center point of both pinches for tracking
                const pinch1Center = { x: (p1_thumb.x + p1_index.x)/2, y: (p1_thumb.y + p1_index.y)/2 };
                const pinch2Center = { x: (hand2[4].x + hand2[8].x)/2, y: (hand2[4].y + hand2[8].y)/2 };
                
                const handsDistance = calculateDistance(pinch1Center, pinch2Center);

                if (!state.isTwoHandPinch) {
                    // Started two hand pinch
                    state.initialPinchDistance = handsDistance;
                    state.baseScale = state.currentScale;
                    state.isTwoHandPinch = true;
                } else {
                    // Dragging (Scaling)
                    const scaleFactor = handsDistance / state.initialPinchDistance;
                    let newScale = state.baseScale * scaleFactor;
                    // Clamp scale
                    newScale = Math.max(0.2, Math.min(newScale, 3.0));
                    
                    state.currentScale = newScale;
                    if(currentModel) {
                        currentModel.scale.set(newScale, newScale, newScale);
                    }
                }
                // Reset rotation tracking to prevent jumping
                state.isPinching = false; 
            } 
            
            // B. One-Hand Rotation
            else if (isHand1Pinching) {
                state.isTwoHandPinch = false; // Reset 2-hand state

                // Center of the pinch
                const cx = (p1_thumb.x + p1_index.x) / 2;
                const cy = (p1_thumb.y + p1_index.y) / 2;

                if (!state.isPinching) {
                    // Start of pinch
                    state.lastX = cx;
                    state.lastY = cy;
                    state.isPinching = true;
                } else {
                    // Dragging
                    const dx = cx - state.lastX;
                    const dy = cy - state.lastY;

                    if (currentModel) {
                        // MediaPipe x is 0-1 (left to right), y is 0-1 (top to bottom)
                        // Rotate Y axis based on X movement
                        currentModel.rotation.y += dx * config.sensitivity.rotate * 3;
                        // Rotate X axis based on Y movement
                        currentModel.rotation.x += dy * config.sensitivity.rotate * 3;
                    }

                    state.lastX = cx;
                    state.lastY = cy;
                }
            } 
            
            // C. No Gestures
            else {
                state.isPinching = false;
                state.isTwoHandPinch = false;
            }
        }

        // --- MediaPipe Initialization ---
        const videoElement = document.getElementById('input_video');
        
        const hands = new Hands({locateFile: (file) => {
            return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
        }});

        hands.setOptions({
            maxNumHands: 2,
            modelComplexity: 1,
            minDetectionConfidence: 0.7,
            minTrackingConfidence: 0.7
        });

        hands.onResults((results) => {
            handleGestures(results);
            
            // Update UI Status
            const statusDot = document.getElementById('status-dot');
            if (results.multiHandLandmarks.length > 0) {
                statusDot.classList.add('active');
            } else {
                statusDot.classList.remove('active');
            }
        });

        // Camera Utils wrapper for MediaPipe
        const cameraUtils = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({image: videoElement});
            },
            width: 1280,
            height: 720
        });
        
        cameraUtils.start()
            .then(() => {
                document.getElementById('loading').style.display = 'none';
                console.log("WebAR System Started");
            })
            .catch(err => {
                document.getElementById('loading').innerText = "Error accessing webcam. Allow permissions.";
                console.error(err);
            });


        // --- UI Events ---
        document.getElementById('model-selector').addEventListener('change', (e) => {
            switchModel(e.target.value);
        });

        document.getElementById('toggle-wireframe').addEventListener('click', () => {
            state.isWireframe = !state.isWireframe;
            updateWireframe();
        });


        // --- Animation Loop ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();

            if (currentModel) {
                // Heartbeat Animation
                if (state.activeModelType === 'heart') {
                    // Beat function: fast expansion, slow contraction
                    const beat = Math.sin(time * 10) * 0.05 + 1;
                    // Only pulse if we aren't currently manually scaling heavily
                    if(!state.isTwoHandPinch) {
                        currentModel.scale.set(
                            state.currentScale * beat, 
                            state.currentScale * beat, 
                            state.currentScale * beat
                        );
                    }
                }

                // Engine Animation
                if (state.activeModelType === 'engine') {
                    // Rotate the fan blades
                    currentModel.children.forEach(child => {
                        if (child.userData.isRotor) {
                            child.rotation.x += 0.2;
                        }
                    });
                }
            }

            renderer.render(scene, camera);
        }

        animate();

        // Handle Window Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

    </script>
</body>
</html>
